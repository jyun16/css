
<body>
  <form>
    <div class="line">
      <div class="label">TEST</div>
      <div class="input">
        <input type="text"/>
      </div>
    </div>
    <div class="line">
      <div class="label">CHECKBOX</div>
      <div class="input">
        <div class="checkbox">
          <label>
            <input type="checkbox" checked="checked"/>AAAAAAAAAAAAAAAAAAAA
          </label>
          <label>
            <input type="checkbox" checked="checked"/>BBBBBBBBBB
          </label>
          <label>
            <input type="checkbox"/>CCCCCCCCCC
          </label>
          <label>
            <input type="checkbox"/>DDDDDDDDDD
          </label>
          <label>
            <input type="checkbox"/>EEEEEEEEEE
          </label>
        </div>
      </div>
    </div>
    <div class="line">
      <div class="label">RADIO</div>
      <div class="input">
        <div class="radio">
          <label>
            <input type="radio" name="radio" checked="checked"/>AAAAAAAAAA
          </label>
          <label>
            <input type="radio" name="radio"/>BBBBBBBBBB
          </label>
          <label>
            <input type="radio" name="radio"/>CCCCCCCCCC
          </label>
          <label>
            <input type="radio" name="radio"/>DDDDDDDDDD
          </label>
          <label>
            <input type="radio" name="radio"/>EEEEEEEEEE
          </label>
        </div>
      </div>
    </div>
    <div class="line">
      <div class="label">SELECT</div>
      <div class="input">
        <div class="select">
          <select>
            <option>hoge</option>
            <option>fuga</option>
          </select>
        </div>
      </div>
    </div>
    <div class="line">
      <div class="label">TEXTAREA</div>
      <div class="input">
        <textarea rows="4"></textarea>
      </div>
    </div>
    <div class="line">
      <div class="label">SEARCH</div>
      <div class="input">
        <div class="search">
          <label>
            <input type="text"/>
            <button></button>
          </label>
        </div>
      </div>
    </div>
    <div class="line">
      <div class="label">PASSWORD</div>
      <div class="input">
        <div class="password">
          <label>
            <input type="password" value="hogefuga"/>
            <button></button>
          </label>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="primary">GO</button>
    </div>
  </form>
  <style>@import url(https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200);
* {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

form {
  border: 2px solid green;
  display: flex;
  flex-direction: column;
  width: 100%;
  margin: 0 auto;
  padding: 0.5rem;
  gap: 0.5rem;
}
form .line {
  display: flex;
  flex-direction: row;
  align-items: center;
}
form .line .label {
  width: 200px;
}
form .line .input {
  flex: 1;
}
form .line .input input[type=text], form .line .input input[type=password] {
  width: 100%;
  padding: 10px;
  border: 2px solid #ddd;
  border-radius: 5px;
}
form .line .input input[type=text]:focus, form .line .input input[type=password]:focus {
  border-color: #0099ff;
  outline: none;
}
form .line .input .checkbox {
  display: flex;
  flex-wrap: wrap;
  gap: 0 1em;
  border: none;
}
form .line .input .checkbox label {
  display: flex;
  align-items: center;
  gap: 0 0.5em;
  position: relative;
  cursor: pointer;
  user-select: none;
}
form .line .input .checkbox label::before {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  border: 2px solid #ddd;
  content: "";
}
form .line .input .checkbox label:has(:checked)::after {
  position: absolute;
  top: 5px;
  left: 6px;
  transform: rotate(45deg);
  width: 4px;
  height: 9px;
  border: solid #0099ff;
  border-width: 0 3px 3px 0;
  content: "";
}
form .line .input .checkbox input {
  display: none;
}
form .line .input .radio {
  display: flex;
  flex-wrap: wrap;
  gap: 0 1em;
  border: none;
}
form .line .input .radio label {
  display: flex;
  align-items: center;
  gap: 0 0.5em;
  position: relative;
  cursor: pointer;
  user-select: none;
}
form .line .input .radio label::before, form .line .input .radio label::after {
  border-radius: 50%;
  content: "";
}
form .line .input .radio label::before {
  width: 18px;
  height: 18px;
  border: 2px solid #ddd;
  box-sizing: border-box;
}
form .line .input .radio label::after {
  position: absolute;
  top: 50%;
  left: 9px;
  transform: translate(-50%, -50%);
  width: 9px;
  height: 9px;
  background-color: #ddd;
}
form .line .input .radio label:has(:checked)::after {
  background-color: #0099ff;
}
form .line .input .radio input {
  display: none;
}
form .line .input .select {
  display: inline-flex;
  align-items: center;
  position: relative;
}
form .line .input .select::after {
  position: absolute;
  right: 15px;
  width: 10px;
  height: 7px;
  background-color: #535353;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  content: "";
  pointer-events: none;
}
form .line .input .select select {
  appearance: none;
  padding: 10px;
  border: 2px solid #ddd;
  border-radius: 5px;
  background-color: #fff;
  min-width: 230px;
  font-size: 1em;
  cursor: pointer;
}
form .line .input .select select:focus {
  border-color: #0099ff;
  outline: none;
}
form .line .input textarea {
  width: 100%;
  padding: 10px;
  border: 2px solid #ddd;
  border-radius: 5px;
}
form .line .input textarea:focus {
  border-color: #0099ff;
  outline: none;
}
form .actions {
  display: flex;
  justify-content: center;
}
form button.primary {
  display: flex;
  justify-content: center;
  align-items: center;
  min-width: 200px;
  border: 0;
  border-radius: 5px;
  color: white;
  background-color: #0066ff;
  font-weight: bold;
  padding: 0.7rem;
  cursor: pointer;
}

.search {
  position: relative;
}
.search button {
  position: absolute;
  top: 6px;
  right: 12px;
  border: none;
  background-color: transparent;
  cursor: pointer;
}
.search button::after {
  color: #999;
  font-size: 24px;
  font-family: "Material Symbols Outlined";
  content: "\e8b6";
}

.password {
  position: relative;
}
.password button {
  position: absolute;
  top: 6px;
  right: 12px;
  border: none;
  background-color: transparent;
  cursor: pointer;
}
.password button::after {
  color: #999;
  font-size: 24px;
  font-family: "Material Symbols Outlined";
  content: "\e8f4";
}

@media (width < 600px) {
  form .line {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  form .line .input {
    width: 100%;
  }
}
  </style>
</body>
